# SQL Server Connection
spring.datasource.url=jdbc:sqlserver:DATABASE;databaseName=DATABASE-NAME;encrypt=false;trustServerCertificate=true

spring.datasource.username=USERNAME
spring.datasource.password=PASSWORD
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jpa.open-in-view=false

#Hibernate is converting MaticniPodatki to maticni_podatki (snake_case) automatically. We need to tell it the exact table name.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Vaadin
vaadin.launch-browser=true

# CalcuQuote
calcuquote.username=USERNAME
calcuquote.password=PASSWORD
calcuquote.url=https://login.calcuquote.com/Account/Login